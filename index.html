<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ambiloop -- ambient audio layer composer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-bar">
  <span class="logo">ambiloop</span>
  <span class="subtitle">ambient audio layer composer</span>
  <button id="fileBtn" class="btn-top">+ Add Files</button>
  <input type="file" id="fileInput" multiple accept="audio/*" hidden>
  <button id="exportBtn" class="btn-top" disabled>Export WAV</button>
</header>

<main>
  <div id="layersPanel" class="layers-panel">
    <div class="panel-header">
      <h2>Layers</h2>
      <span id="layerCount" class="count">0</span>
    </div>
    <div id="layerList" class="layer-list">
      <div class="empty-state">Add audio files to begin</div>
    </div>
  </div>

  <div id="timeline" class="timeline">
    <div class="panel-header">
      <h2>Timeline</h2>
    </div>
    <div id="timelineScroll" class="timeline-scroll">
      <div id="timelineRuler" class="timeline-ruler"></div>
      <div id="timelineTracks" class="timeline-tracks">
        <div class="empty-state">Add layers to see the timeline</div>
      </div>
    </div>
  </div>
</main>

<div class="bottom-bar">
  <div id="masterBar" class="master-bar">
    <div class="master-bar-header">
      <span class="master-bar-label">Composition</span>
      <span id="masterTime" class="master-bar-time"></span>
    </div>
    <div class="master-timeline-wrapper">
      <div id="masterTimeline" class="master-timeline"></div>
      <div id="masterPlayhead" class="master-playhead"></div>
    </div>
  </div>

  <footer>
    <div class="transport">
      <button id="playBtn" disabled title="Play all layers">&#9654; Play</button>
      <button id="stopBtn" disabled title="Stop">&#9632; Stop</button>
      <button id="splitBtn" title="Split tool: click a block to cut it">&#9986; Split</button>
      <label class="crossfade-option" title="Blend tail into head for seamless looping">
        <input type="checkbox" id="crossfadeToggle">
        <span>Loop</span>
        <input type="number" id="crossfadeDur" value="2.0" min="0.1" max="10" step="0.5" disabled>
        <span>s</span>
      </label>
      <label class="zoom-control" title="Timeline zoom">
        <span>&#8981;</span>
        <input type="range" id="zoomSlider" min="10" max="160" value="40" step="5">
        <span>&#8982;</span>
      </label>
    </div>
    <div id="statusBar" class="status-bar">Ready. Add audio files to begin.</div>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
